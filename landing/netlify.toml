# Netlify config for IHC Tool™ landing
#
# Place this at the deployed site's root (i.e. publish "landing/" so this file
# ends up alongside index.html). Netlify reads it automatically on each build.

[build]
  # No build step needed — it's static HTML.
  publish = "."
  command = ""

# Security headers for the landing
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security      = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options                = "DENY"
    X-Content-Type-Options         = "nosniff"
    Referrer-Policy                = "strict-origin-when-cross-origin"
    Permissions-Policy             = "camera=(), microphone=(), geolocation=()"
    # CSP: relax if we add external scripts (analytics, etc.)
    Content-Security-Policy        = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; form-action 'self' https://*.netlify.app https://tyradvisor.com;"

# Cache static assets aggressively, HTML lightly
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

