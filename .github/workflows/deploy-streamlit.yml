name: Deploy Admin Panel to Streamlit Cloud

on:
  push:
    branches: [main, fix/security-license-go-live]
    paths:
      - 'admin-panel/**'
      - '.streamlit/**'
      - '.github/workflows/deploy-streamlit.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r admin-panel/requirements.txt
          pip install streamlit

      - name: Deploy to Streamlit Cloud
        env:
          STREAMLIT_CLOUD_TOKEN: ${{ secrets.STREAMLIT_CLOUD_TOKEN }}
        run: |
          streamlit cloud deploy \
            --logger.level=debug \
            --client.showErrorDetails=true \
            admin-panel/app.py

      - name: Send deployment notification
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = context.job.status === 'success' ? '✅ SUCCESS' : '❌ FAILED';
            const deployment_url = 'https://admin-tyradvisor.streamlit.app';

            core.notice(`${status}: Streamlit deployment`);
            if (context.job.status === 'success') {
              core.notice(`Admin panel available at: ${deployment_url}`);
            }
